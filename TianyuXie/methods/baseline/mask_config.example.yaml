paths:
  # Local paths. Copy this file to mask_config.yaml and edit these values.
  events_folder: "path/to/marine/events"
  masks_folder: "outputs/masks"
  plots_folder: "outputs/masks_plots"
  alt_base_folder: "outputs/alternative"
  alt_3_db_plots_subfolder: "plots_thr_3db"
  alt_3_db_masks_subfolder: "masks_thr_3db"
  alt_4_5_db_plots_subfolder: "plots_thr_4p5db"
  alt_4_5_db_masks_subfolder: "masks_thr_4p5db"
  curated_plots_subfolder: "plots_thr_3db"
  ground_truth_masks_folder: "path/to/ground_truth_masks"

processing:
  resampled_sr: 48000
  padding: 1.0
  initial_threshold_db: 3.0
  reestimate_thresholds_db: [3.0, 4.5]

flags:
  run_initial_masks: false
  run_reestimate_missing: false
  copy_curated_plots: false
  remove_masks_without_plots: false
  evaluate_with_ground_truth: false
